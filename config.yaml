# OCR Engine Configuration

# General Settings
general:
  device: "cuda"  # cuda or cpu
  num_workers: 4
  seed: 42

# Preprocessing Settings
preprocessing:
  target_size: [1280, 960]  # max width, max height
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]
  
  binarization:
    method: "adaptive"  # adaptive, otsu, sauvola
    block_size: 11
    c: 2
  
  denoise:
    enabled: true
    method: "bilateral"  # bilateral, gaussian, nlmeans
    strength: 10
  
  deskew:
    enabled: true
    max_angle: 45

# Text Detection (DBNet) Settings
detection:
  model:
    backbone: "resnet18"  # resnet18, resnet50
    pretrained: true
  
  input_size: [640, 640]
  
  inference:
    threshold: 0.3
    box_threshold: 0.5
    max_candidates: 1000
    unclip_ratio: 1.5
  
  weights_path: "ocr_engine/detection/weights/dbnet.pth"

# Text Recognition (CRNN) Settings
recognition:
  model:
    input_height: 32
    input_width: 256
    hidden_size: 256
    num_layers: 2
    dropout: 0.1
  
  inference:
    beam_width: 5
    max_length: 100
  
  weights_path: "ocr_engine/recognition/weights/crnn.pth"

# Training Settings
training:
  detection:
    batch_size: 8
    learning_rate: 0.001
    epochs: 100
    save_interval: 10
    val_interval: 5
  
  recognition:
    batch_size: 64
    learning_rate: 0.001
    epochs: 100
    save_interval: 10
    val_interval: 5
  
  augmentation:
    enabled: true
    rotation_range: [-10, 10]
    scale_range: [0.8, 1.2]
    blur_prob: 0.3
    noise_prob: 0.3

# Post-processing Settings
postprocessing:
  spell_check:
    enabled: true
    language: "tr"  # tr, en, or both
    max_edit_distance: 2
  
  text_merger:
    line_threshold: 10  # pixels
    paragraph_threshold: 20  # pixels

# API Settings
api:
  host: "0.0.0.0"
  port: 8000
  max_file_size: 10485760  # 10MB
  allowed_extensions: [".jpg", ".jpeg", ".png", ".bmp", ".tiff", ".webp"]

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
